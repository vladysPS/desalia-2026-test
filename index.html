<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desalia 2026</title>
    <link rel="stylesheet" href="base.css">
    
</head>
<body>
    <div id="orientation-overlay" class="hidden">
        <div class="overlay-card">
            <p class="overlay-text">Please rotate your device!</p>
            <p class="overlay-subtext">Minimum width: 600px</p>
        </div>
    </div>
    <section class="game-main-section">
        <div id="canvas-container">
            <canvas id="game-canvas" height="700" width="1225"></canvas>
    
            <button id="start-button">
                <img src="assets/images/start_button.gif" alt="start-button">
            </button>
    
            <div id="main-background"></div>

            <div class="restart-container hidden">
                <div class="game-over-gif-cont">
                    <img src="assets/images/game-over.gif" alt="start-button">
                </div>
                <p class="end-score">SCORE: 0</p>
                <button id="restart-button">
                    <img src="assets/images/start_button.gif" alt="restart-button">
                </button>
            </div>
        </div>


    </section>

    <script type="module" src="index.js"></script>
</body>
</html>
